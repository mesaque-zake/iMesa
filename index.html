<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check!</title>
    
    <!-- Open Graph / Prévia para WhatsApp e Redes Sociais -->
    <meta property="og:title" content="Check! - Controle Operacional">
    <meta property="og:description" content="Acesse agora o Controle Operacional do Sesc Mesa Brasil - Unidade Itaquera">
    <meta property="og:image" content="Icon512.png">
    <meta property="og:type" content="website">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link class="rounded-xl" rel="icon" type="image/png" href="Favicon.png">
    <link rel="apple-touch-icon" href="Icon180.png">
    
    <!-- Fontes do Google: Plus Jakarta Sans e Dancing Script -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        dancing: ['"Dancing Script"', 'cursive'] // Classe font-dancing habilitada!
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 overflow-hidden font-sans text-slate-800 antialiased select-none">

    <!-- Iframe do GAS com permissões nativas de GPS e Área de Transferência liberadas para o PWA -->
    <iframe 
        id="gas-frame"
        src="https://script.google.com/macros/s/AKfycbyLG_IyGOtAp6SYEsfTIC2Zs9Yzqj3016oSf-pztDsqtVX9bO-53OQHylIb8XDRycJA/exec" 
        class="absolute inset-0 w-full h-full border-none z-0"
        allow="geolocation *; clipboard-write *">
    </iframe>

    <button id="install-btn" onclick="installPWA()" class="absolute bottom-6 right-6 md:bottom-10 md:right-10 bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-2 z-40 hidden opacity-0 translate-y-10 transition-all duration-500">
        <i data-lucide="download" class="w-5 h-5"></i>
        <span class="font-semibold text-sm">Instalar App</span>
    </button>

    <div id="ios-prompt" class="absolute bottom-8 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm bg-white p-4 rounded-2xl shadow-2xl z-40 hidden opacity-0 translate-y-10 transition-all duration-500 flex flex-col items-center text-center gap-2 border border-slate-100">
        <button onclick="document.getElementById('ios-prompt').classList.add('hidden')" class="absolute top-2 right-2 text-slate-400 hover:text-slate-600 transition-colors">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
        <p class="text-sm text-slate-600 font-medium leading-relaxed mt-2">
            Para instalar, toque em <i data-lucide="share" class="inline w-4 h-4 text-blue-500 mx-1"></i> <strong>Compartilhar</strong> e depois em <br><strong>"Adicionar à Tela de Início"</strong>.
        </p>
        <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-4 h-4 bg-white rotate-45 border-r border-b border-slate-100"></div>
    </div>

    <div id="loader-screen" class="absolute inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
        
        <!-- Wrapper Centralizador: Garante que os ícones e o texto andem sempre juntos -->
        <div class="relative flex flex-col items-center justify-center z-20">
            
            <!-- Contêiner de Ícones em Pentágono (Matemática de ângulo 72º) -->
            <div class="relative w-48 h-48 flex items-center justify-center transform transition-transform duration-700 md:scale-125">
                
                <!-- Icone 1: Aparelhos (Azul) - Topo (0º) -->
                <div id="icon-1" class="actor absolute w-16 h-16 bg-blue-600 rounded-2xl shadow-2xl shadow-blue-600/[0.65] flex items-center justify-center z-10" style="transform: translate(0px, -55px);">
                    <i data-lucide="smartphone" class="text-white w-8 h-8"></i>
                </div>
                
                <!-- Icone 2: Lavagem (Verde) - Direita Superior (72º) -->
                <div id="icon-2" class="actor absolute w-16 h-16 bg-emerald-600 rounded-2xl shadow-2xl shadow-emerald-600/[0.65] flex items-center justify-center z-10" style="transform: translate(52px, -17px);">
                    <i data-lucide="droplets" class="text-white w-8 h-8"></i>
                </div>

                <!-- Icone 3: Ways (Fúcsia 800) - Direita Inferior (144º) -->
                <div id="icon-5" class="actor absolute w-16 h-16 bg-fuchsia-800 rounded-2xl shadow-2xl shadow-fuchsia-800/[0.65] flex items-center justify-center z-10 font-dancing" style="transform: translate(32px, 45px);">
                    <span class="text-white text-3xl font-bold leading-none mt-1 select-none">W</span>
                </div>

                <!-- Icone 4: Visão Geral (Amarelo) - Esquerda Inferior (216º) -->
                <div id="icon-3" class="actor absolute w-16 h-16 bg-amber-500 rounded-2xl shadow-2xl shadow-amber-500/[0.65] flex items-center justify-center z-10" style="transform: translate(-32px, 45px);">
                    <i data-lucide="bar-chart-3" class="text-white w-8 h-8"></i>
                </div>

                <!-- Icone 5: Relatórios (Vermelho) - Esquerda Superior (288º) -->
                <div id="icon-4" class="actor absolute w-16 h-16 bg-red-600 rounded-2xl shadow-2xl shadow-red-600/[0.65] flex items-center justify-center z-10" style="transform: translate(-52px, -17px);">
                    <i data-lucide="file-text" class="text-white w-8 h-8"></i>
                </div>

                <!-- O Alvo Final da Fusão: O Logo "iM" Glitch em Plus Jakarta Sans ("M" em Negrito absoluto e "i" Fino) -->
                <div id="icon-check" class="actor absolute w-28 h-28 bg-slate-800 rounded-3xl shadow-2xl shadow-slate-800/50 flex items-center justify-center z-20 overflow-hidden" style="transform: scale(0); opacity: 0;">
                    <div class="relative flex items-center justify-center font-sans tracking-tighter text-5xl leading-none select-none" style="width: 100%; height: 100%;">
                        <!-- Camada Ciano (Glitch Exagerado) -->
                        <span id="pwa-glitch-cyan" class="absolute font-normal text-[#00f0ff] opacity-80" style="transform: translate(-3px, -1px); font-size: inherit;">
                            i<span class="font-black">M</span>
                        </span>
                        <!-- Camada Vermelha (Glitch Exagerado) -->
                        <span id="pwa-glitch-rose" class="absolute font-normal text-[#ff0055] opacity-85" style="transform: translate(3px, 1px); font-size: inherit;">
                            i<span class="font-black">M</span>
                        </span>
                        <!-- Camada Frontal Branca -->
                        <span class="relative font-normal text-white" style="font-size: inherit;">
                            i<span class="font-black">M</span>
                        </span>
                    </div>
                </div>

            </div>

            <div id="welcome-text" class="text-center mt-6 space-y-1 fade-in">
              <h1 class="text-3xl font-black text-slate-800 tracking-tight leading-none">Check!</h1>
              <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Sesc Mesa Brasil</p>
            </div>
            
        </div>

        <!-- Alerta de Conexão Offline -->
        <div id="offline-alert" class="absolute flex flex-col items-center opacity-0 transform transition-all duration-1000 hidden z-30">
            <i data-lucide="wifi-off" class="text-slate-400 w-10 h-10 mb-3"></i>
            <span class="text-xl font-bold text-slate-700 mb-4 tracking-tight">Sem Conexão</span>
            <button onclick="window.location.reload()" class="px-6 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold rounded-full shadow-sm transition-all active:scale-95 focus:outline-none">
                Tentar Novamente
            </button>
        </div>

        <!-- Assinatura Mesaque -->
        <div id="signature" class="absolute bottom-8 opacity-0 transition-opacity duration-1000">
            <p class="text-xs md:text-sm font-medium text-slate-400">
                Powered with <span class="text-[#e80523] text-sm md:text-base leading-none">&#10084;</span> by <strong class="text-slate-600">Mesaque</strong>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
