<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesc iMesa Brasil</title>
    
    <meta property="og:title" content="iMesa!">
    <meta property="og:description" content="Acesse o Ecossistema Operacional do Sesc Mesa Brasil - Unidade Itaquera">
    <meta property="og:image" content="assets/Share.png">
    <meta property="og:type" content="website">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link rel="icon" type="image/png" href="assets/Favicon.png">
    <link rel="apple-touch-icon" href="assets/Icon180.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Dancing+Script:wght@700&family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        dancing: ['"Dancing Script"', 'cursive'],
                        montserrat: ['"Montserrat"', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0f172a] overflow-hidden font-sans text-slate-800 antialiased select-none w-screen h-screen m-0 p-0">

    <iframe 
        id="gas-frame"
        src="https://script.google.com/macros/s/AKfycbzEOZzvFYvwESMxk7ZcWSL4P0zvssqSiscWl0fzn5eb-15OQWzDgBrj9XU0C5fZGTXR/exec" 
        class="absolute inset-0 w-full h-full border-none z-0"
        allow="geolocation *; clipboard-write *">
    </iframe>

    <button id="install-btn" onclick="installPWA()" class="absolute bottom-6 right-6 md:bottom-10 md:right-10 bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-2 z-40 hidden opacity-0 translate-y-10 transition-all duration-500">
        <i data-lucide="download" class="w-5 h-5"></i>
        <span class="font-semibold text-sm">Instalar App</span>
    </button>

    <div id="ios-prompt" class="absolute bottom-8 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm bg-white p-4 rounded-2xl shadow-2xl z-40 hidden opacity-0 translate-y-10 transition-all duration-500 flex flex-col items-center text-center gap-2 border border-slate-100">
        <button onclick="document.getElementById('ios-prompt').classList.add('hidden')" class="absolute top-2 right-2 text-slate-400 hover:text-slate-600 transition-colors">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
        <p class="text-sm text-slate-600 font-medium leading-relaxed mt-2">
            Para instalar, toque em <i data-lucide="share" class="inline w-4 h-4 text-blue-500 mx-1"></i> <strong>Compartilhar</strong> e depois em <br><strong>"Adicionar à Tela de Início"</strong>.
        </p>
        <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-4 h-4 bg-white rotate-45 border-r border-b border-slate-100"></div>
    </div>

    <div id="loader-screen" class="absolute inset-0 w-full h-full bg-slate-50 z-50 flex items-center justify-center origin-center overflow-hidden">
        
        <div class="relative flex items-center justify-center w-[400px] h-[400px] md:scale-110 transform select-none">
            
            <div id="icon-A" class="actor absolute w-12 h-12 bg-blue-600 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0">
                <i data-lucide="smartphone" class="text-white w-6 h-6"></i>
            </div>
            <div id="icon-B" class="actor absolute w-12 h-12 bg-emerald-600 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0">
                <i data-lucide="droplets" class="text-white w-6 h-6"></i>
            </div>
            <div id="icon-C" class="actor absolute w-12 h-12 bg-amber-500 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0">
                <i data-lucide="bar-chart-3" class="text-white w-6 h-6"></i>
            </div>
            <div id="icon-H" class="actor absolute w-12 h-12 bg-red-600 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0">
                <i data-lucide="file-text" class="text-white w-6 h-6"></i>
            </div>
            <div id="icon-D" class="actor absolute w-12 h-12 bg-fuchsia-800 rounded-2xl shadow-lg flex items-center justify-center z-20 font-dancing opacity-0 scale-0">
                <span class="text-white text-xl font-bold leading-none mt-1">W</span>
            </div>
            <div id="icon-E" class="actor absolute w-12 h-12 bg-orange-500 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0">
                <i data-lucide="receipt" class="text-white w-6 h-6"></i>
            </div>
            <div id="icon-F" class="actor absolute w-12 h-12 bg-rose-500 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0">
                <i data-lucide="gamepad-2" class="text-white w-6 h-6"></i>
            </div>
            <div id="icon-G" class="actor absolute w-12 h-12 bg-slate-500 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0">
                <i data-lucide="settings" class="text-white w-6 h-6"></i>
            </div>

            <div id="glow-container" class="absolute w-full h-full flex items-center justify-center pointer-events-none opacity-0 scale-50 z-10 transition-all duration-[600ms]">
                <div class="absolute w-44 h-44 rounded-full bg-blue-500/40 blur-3xl transform translate-x-[-30px] translate-y-[-30px]"></div>
                <div class="absolute w-44 h-44 rounded-full bg-fuchsia-500/40 blur-3xl transform translate-x-[30px] translate-y-[30px]"></div>
                <div class="absolute w-44 h-44 rounded-full bg-emerald-500/40 blur-3xl transform translate-x-[-30px] translate-y-[30px]"></div>
                <div class="absolute w-44 h-44 rounded-full bg-amber-500/40 blur-3xl transform translate-x-[30px] translate-y-[-30px]"></div>
            </div>

            <div id="monolith-brand" class="absolute flex flex-col items-center justify-center opacity-0 scale-90 z-30 pointer-events-none w-full transition-all duration-[500ms]">
                <span id="mono-sesc" class="font-montserrat font-extrabold text-[#020f3d]/15 text-6xl md:text-7xl tracking-widest uppercase select-none pb-2">Sesc</span>
                
                <div id="mono-imesa-text" class="font-montserrat text-[#020f3d] text-5xl md:text-6xl flex items-baseline justify-center tracking-tight">
                    <span id="mono-i" class="font-normal animate-i-glitch">i</span>
                    <span id="mono-mesa" class="font-extrabold">MESA</span>
                </div>

                <span id="mono-brasil" class="font-montserrat font-extrabold text-[#020f3d]/15 text-5xl md:text-6xl tracking-[0.18em] uppercase select-none pt-2">Brasil</span>
            </div>

        </div>

        <div id="offline-alert" class="absolute flex flex-col items-center justify-center opacity-0 scale-95 transform transition-all duration-500 hidden z-50">
            <i data-lucide="wifi-off" class="text-slate-400 w-12 h-12 mb-3"></i>
            <span class="text-xl font-montserrat font-800 text-slate-700 mb-4 tracking-tight">Sem Conexão</span>
            <button onclick="window.location.reload()" class="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-full shadow-md transition-all active:scale-95 focus:outline-none text-sm tracking-wide">
                Tentar Novamente
            </button>
        </div>

        <div id="signature" class="absolute bottom-8 opacity-0 transition-opacity duration-1000 z-30 w-full text-center pointer-events-none">
            <p class="text-xs md:text-sm font-medium text-slate-400">
                Powered with <span class="text-[#e80523] text-sm md:text-base leading-none">&#10084;</span> by <strong class="text-slate-600">Mesaque</strong>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
