<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesc iMesa Brasil</title>
    
    <!-- Open Graph / Prévia de Redes Sociais -->
    <meta property="og:title" content="iMesa">
    <meta property="og:description" content="Acesse o Ecossistema Operacional do Sesc Mesa Brasil - Unidade Itaquera">
    <meta property="og:image" content="Icon512.png">
    <meta property="og:type" content="website">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link rel="icon" type="image/png" href="Favicon.png">
    <link rel="apple-touch-icon" href="Icon180.png">
    
    <!-- Fontes do Google: Plus Jakarta Sans, Dancing Script e Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        dancing: ['"Dancing Script"', 'cursive'],
                        montserrat: ['"Montserrat"', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 overflow-hidden font-sans text-slate-800 antialiased select-none">

    <!-- Iframe do GAS com permissões completas de hardware -->
    <iframe 
        id="gas-frame"
        src="https://script.google.com/macros/s/AKfycbzEOZzvFYvwESMxk7ZcWSL4P0zvssqSiscWl0fzn5eb-15OQWzDgBrj9XU0C5fZGTXR/exec" 
        class="absolute inset-0 w-full h-full border-none z-0"
        allow="geolocation *; clipboard-write *">
    </iframe>

    <!-- Botão de Instalação do PWA -->
    <button id="install-btn" onclick="installPWA()" class="absolute bottom-6 right-6 md:bottom-10 md:right-10 bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-2 z-40 hidden opacity-0 translate-y-10 transition-all duration-500">
        <i data-lucide="download" class="w-5 h-5"></i>
        <span class="font-semibold text-sm">Instalar App</span>
    </button>

    <!-- Balão de Instruções para iOS (Apple) -->
    <div id="ios-prompt" class="absolute bottom-8 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm bg-white p-4 rounded-2xl shadow-2xl z-40 hidden opacity-0 translate-y-10 transition-all duration-500 flex flex-col items-center text-center gap-2 border border-slate-100">
        <button onclick="document.getElementById('ios-prompt').classList.add('hidden')" class="absolute top-2 right-2 text-slate-400 hover:text-slate-600 transition-colors">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
        <p class="text-sm text-slate-600 font-medium leading-relaxed mt-2">
            Para instalar, toque em <i data-lucide="share" class="inline w-4 h-4 text-blue-500 mx-1"></i> <strong>Compartilhar</strong> e depois em <br><strong>"Adicionar à Tela de Início"</strong>.
        </p>
        <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-4 h-4 bg-white rotate-45 border-r border-b border-slate-100"></div>
    </div>

    <!-- Tela do Carregador (Loader / Splash Screen) -->
    <div id="loader-screen" class="absolute inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center transition-all duration-1000">
        
        <!-- Wrapper Centralizador -->
        <div class="relative flex flex-col items-center justify-center z-20">
            
            <!-- Contêiner de Ícones (Pentágono e Fusoes) -->
            <div class="relative w-48 h-48 flex items-center justify-center transform transition-transform duration-700 md:scale-125">
                
                <!-- ÍCONES OPERACIONAIS (Iniciam camuflados no ponto zero para a cascata elástica) -->
                
                <!-- Icone A: Aparelhos (Azul) -->
                <div id="icon-1" class="actor absolute w-14 h-14 bg-blue-600 rounded-2xl shadow-lg shadow-blue-600/30 flex items-center justify-center z-20 opacity-0 scale-0" style="transform: translate(0px, 0px);">
                    <i data-lucide="smartphone" class="text-white w-7 h-7"></i>
                </div>
                
                <!-- Icone B: Lavagem (Verde Emerald) -->
                <div id="icon-2" class="actor absolute w-14 h-14 bg-emerald-600 rounded-2xl shadow-lg shadow-emerald-600/30 flex items-center justify-center z-20 opacity-0 scale-0" style="transform: translate(0px, 0px);">
                    <i data-lucide="droplets" class="text-white w-7 h-7"></i>
                </div>

                <!-- Icone C: Visão Geral (Amarelo Amber) -->
                <div id="icon-3" class="actor absolute w-14 h-14 bg-amber-500 rounded-2xl shadow-lg shadow-amber-500/30 flex items-center justify-center z-20 opacity-0 scale-0" style="transform: translate(0px, 0px);">
                    <i data-lucide="bar-chart-3" class="text-white w-7 h-7"></i>
                </div>

                <!-- Icone H: Relatórios (Vermelho) -->
                <div id="icon-4" class="actor absolute w-14 h-14 bg-red-600 rounded-2xl shadow-lg shadow-red-600/30 flex items-center justify-center z-20 opacity-0 scale-0" style="transform: translate(0px, 0px);">
                    <i data-lucide="file-text" class="text-white w-7 h-7"></i>
                </div>

                <!-- Icone D: Ways (Fúcsia) - "W" em Dancing Script -->
                <div id="icon-5" class="actor absolute w-14 h-14 bg-fuchsia-800 rounded-2xl shadow-lg shadow-fuchsia-800/30 flex items-center justify-center z-20 font-dancing opacity-0 scale-0" style="transform: translate(0px, 0px);">
                    <span class="text-white text-2xl font-bold leading-none mt-1 select-none">W</span>
                </div>

                <!-- Icone E: Reembolsos (Laranja) -->
                <div id="icon-6" class="actor absolute w-14 h-14 bg-orange-500 rounded-2xl shadow-lg shadow-orange-500/30 flex items-center justify-center z-20 opacity-0 scale-0" style="transform: translate(0px, 0px);">
                    <i data-lucide="receipt" class="text-white w-7 h-7"></i>
                </div>

                <!-- Icone F: Mini Games (Rosa Rose) -->
                <div id="icon-7" class="actor absolute w-14 h-14 bg-rose-500 rounded-2xl shadow-lg shadow-rose-500/30 flex items-center justify-center z-20 opacity-0 scale-0" style="transform: translate(0px, 0px);">
                    <i data-lucide="gamepad-2" class="text-white w-7 h-7"></i>
                </div>

                <!-- Icone G: Admin (Cinza Slate) -->
                <div id="icon-8" class="actor absolute w-14 h-14 bg-slate-500 rounded-2xl shadow-lg shadow-slate-500/30 flex items-center justify-center z-20 opacity-0 scale-0" style="transform: translate(0px, 0px);">
                    <i data-lucide="settings" class="text-white w-7 h-7"></i>
                </div>

                <!-- AS 8 AURAS CÓSMICAS (Sombras de desfoque curto para serem nítidas e separadas) -->
                <div id="glow-container" class="absolute w-72 h-72 flex items-center justify-center pointer-events-none transition-all duration-[2000ms] hidden opacity-0 z-10 animate-spin-slow">
                    <div id="glow-1" class="absolute w-12 h-12 rounded-full bg-blue-500/35 blur-xl transition-transform duration-1000"></div>
                    <div id="glow-2" class="absolute w-12 h-12 rounded-full bg-emerald-500/35 blur-xl transition-transform duration-1000"></div>
                    <div id="glow-3" class="absolute w-12 h-12 rounded-full bg-amber-500/35 blur-xl transition-transform duration-1000"></div>
                    <div id="glow-5" class="absolute w-12 h-12 rounded-full bg-fuchsia-500/35 blur-xl transition-transform duration-1000"></div>
                    <div id="glow-6" class="absolute w-12 h-12 rounded-full bg-orange-500/35 blur-xl transition-transform duration-1000"></div>
                    <div id="glow-7" class="absolute w-12 h-12 rounded-full bg-rose-500/35 blur-xl transition-transform duration-1000"></div>
                    <div id="glow-8" class="absolute w-12 h-12 rounded-full bg-slate-500/35 blur-xl transition-transform duration-1000"></div>
                    <div id="glow-4" class="absolute w-12 h-12 rounded-full bg-red-500/35 blur-xl transition-transform duration-1000"></div>
                </div>

                <!-- O ALVO DE FUSÃO MONOGRAMA "iM" MORPHING ( Montserrat de alta fidelidade ) -->
                <div id="icon-check" class="actor absolute w-64 h-24 flex items-center justify-center z-30" style="transform: scale(0); opacity: 0;">
                    <!-- O Card principal que contém apenas "i" e "M" (Aumentado para w-20 h-20 e com glitch ativo no "i") -->
                    <div id="monogram-card" class="w-20 h-20 bg-[#020f3d] rounded-2xl shadow-2xl shadow-[#020f3d]/45 flex items-center justify-center font-montserrat text-3xl text-white select-none transition-all duration-700 overflow-hidden whitespace-nowrap">
                        <span id="monogram-i" class="font-normal animate-i-glitch inline-block transition-colors duration-700">i</span>
                        <span id="monogram-M" class="font-extrabold ml-[0.5px] transition-colors duration-700">M</span>
                    </div>
                    <!-- O "ESA" que fica oculto FORA do card, e desliza na cor escura #020f3d ao revelar (Montserrat ExtraBold) -->
                    <span id="monogram-ESA" class="font-montserrat text-3xl font-extrabold text-[#020f3d] opacity-0 max-w-0 inline-block overflow-hidden transition-all duration-500" style="transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); margin-left: 0.5px;">ESA</span>
                </div>

                <!-- WATERMARKS SESC E BRASIL (Alinhadas de forma absoluta e mais juntas/maiores) -->
                <!-- Sesc e MESA em Montserrat ExtraBold (font-extrabold) -->
                <div id="welcome-sesc" class="absolute text-center opacity-0 transform translate-y-2 transition-all duration-700 font-montserrat select-none z-30 pointer-events-none" style="transform: translateY(-48px);">
                    <span class="block text-slate-300 font-extrabold text-sm leading-none tracking-widest uppercase">Sesc</span>
                </div>
                <div id="welcome-brasil" class="absolute text-center opacity-0 transform -translate-y-2 transition-all duration-700 font-montserrat select-none z-30 pointer-events-none" style="transform: translateY(48px);">
                    <span class="block text-slate-300 font-normal text-xs tracking-widest uppercase">Brasil</span>
                </div>

            </div>
        </div>

        <!-- Alerta de Conexão Offline -->
        <div id="offline-alert" class="absolute flex flex-col items-center opacity-0 scale-95 transform transition-all duration-1000 hidden z-30">
            <i data-lucide="wifi-off" class="text-slate-400 w-10 h-10 mb-3"></i>
            <span class="text-xl font-bold text-slate-700 mb-4 tracking-tight">Sem Conexão</span>
            <button onclick="window.location.reload()" class="px-6 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold rounded-full shadow-sm transition-all active:scale-95 focus:outline-none">
                Tentar Novamente
            </button>
        </div>

        <!-- Assinatura Mesaque -->
        <div id="signature" class="absolute bottom-8 opacity-0 transition-opacity duration-1000">
            <p class="text-xs md:text-sm font-medium text-slate-400">
                Powered with <span class="text-[#e80523] text-sm md:text-base leading-none">&#10084;</span> by <strong class="text-slate-600">Mesaque</strong>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
