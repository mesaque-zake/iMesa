<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesc iMesa Brasil</title>
    
    <meta property="og:title" content="iMesa!">
    <meta property="og:description" content="Acesse o Ecossistema Operacional do Sesc Mesa Brasil - Unidade Itaquera">
    <meta property="og:image" content="Share.png">
    <meta property="og:type" content="website">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link rel="icon" type="image/png" href="Favicon.png">
    <link rel="apple-touch-icon" href="Icon180.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        dancing: ['"Dancing Script"', 'cursive'],
                        montserrat: ['"Montserrat"', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 overflow-hidden font-sans text-slate-800 antialiased select-none">

    <iframe 
        id="gas-frame"
        src="https://script.google.com/macros/s/AKfycbzEOZzvFYvwESMxk7ZcWSL4P0zvssqSiscWl0fzn5eb-15OQWzDgBrj9XU0C5fZGTXR/exec" 
        class="absolute inset-0 w-full h-full border-none z-0"
        allow="geolocation *; clipboard-write *">
    </iframe>

    <button id="install-btn" onclick="installPWA()" class="absolute bottom-6 right-6 md:bottom-10 md:right-10 bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-2 z-40 hidden opacity-0 translate-y-10 transition-all duration-500">
        <i data-lucide="download" class="w-5 h-5"></i>
        <span class="font-semibold text-sm">Instalar App</span>
    </button>

    <div id="ios-prompt" class="absolute bottom-8 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm bg-white p-4 rounded-2xl shadow-2xl z-40 hidden opacity-0 translate-y-10 transition-all duration-500 flex flex-col items-center text-center gap-2 border border-slate-100">
        <button onclick="document.getElementById('ios-prompt').classList.add('hidden')" class="absolute top-2 right-2 text-slate-400 hover:text-slate-600 transition-colors">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
        <p class="text-sm text-slate-600 font-medium leading-relaxed mt-2">
            Para instalar, toque em <i data-lucide="share" class="inline w-4 h-4 text-blue-500 mx-1"></i> <strong>Compartilhar</strong> e depois em <br><strong>"Adicionar à Tela de Início"</strong>.
        </p>
        <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-4 h-4 bg-white rotate-45 border-r border-b border-slate-100"></div>
    </div>

    <div id="loader-screen" class="absolute inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center transition-all duration-[600ms] origin-center">
        
        <div class="relative flex flex-col items-center justify-center z-20 w-full h-full">
            
            <div class="relative w-full max-w-lg h-[450px] flex items-center justify-center transform transition-transform duration-700 select-none">
                
                <div id="icon-A" class="actor absolute w-14 h-14 bg-blue-600 rounded-2xl shadow-lg shadow-blue-600/30 flex items-center justify-center z-20 opacity-0 scale-0">
                    <i data-lucide="smartphone" class="text-white w-7 h-7"></i>
                </div>
                
                <div id="icon-B" class="actor absolute w-14 h-14 bg-emerald-600 rounded-2xl shadow-lg shadow-emerald-600/30 flex items-center justify-center z-20 opacity-0 scale-0">
                    <i data-lucide="droplets" class="text-white w-7 h-7"></i>
                </div>

                <div id="icon-C" class="actor absolute w-14 h-14 bg-amber-500 rounded-2xl shadow-lg shadow-amber-500/30 flex items-center justify-center z-20 opacity-0 scale-0">
                    <i data-lucide="bar-chart-3" class="text-white w-7 h-7"></i>
                </div>

                <div id="icon-H" class="actor absolute w-14 h-14 bg-red-600 rounded-2xl shadow-lg shadow-red-600/30 flex items-center justify-center z-20 opacity-0 scale-0">
                    <i data-lucide="file-text" class="text-white w-7 h-7"></i>
                </div>

                <div id="icon-D" class="actor absolute w-14 h-14 bg-fuchsia-800 rounded-2xl shadow-lg shadow-fuchsia-800/30 flex items-center justify-center z-20 font-dancing opacity-0 scale-0">
                    <span class="text-white text-2xl font-bold leading-none mt-1 select-none">W</span>
                </div>

                <div id="icon-E" class="actor absolute w-14 h-14 bg-orange-500 rounded-2xl shadow-lg shadow-orange-500/30 flex items-center justify-center z-20 opacity-0 scale-0">
                    <i data-lucide="receipt" class="text-white w-7 h-7"></i>
                </div>

                <div id="icon-F" class="actor absolute w-14 h-14 bg-rose-500 rounded-2xl shadow-lg shadow-rose-500/30 flex items-center justify-center z-20 opacity-0 scale-0">
                    <i data-lucide="gamepad-2" class="text-white w-7 h-7"></i>
                </div>

                <div id="icon-G" class="actor absolute w-14 h-14 bg-slate-500 rounded-2xl shadow-lg shadow-slate-500/30 flex items-center justify-center z-20 opacity-0 scale-0">
                    <i data-lucide="settings" class="text-white w-7 h-7"></i>
                </div>


                <div id="glow-container" class="absolute w-[450px] h-[450px] flex items-center justify-center pointer-events-none transition-all duration-[1000ms] hidden opacity-0 z-10 animate-spin-slow">
                    <div id="glow-1" class="absolute w-24 h-24 rounded-full bg-blue-500/25 blur-2xl transition-transform duration-[600ms]"></div>
                    <div id="glow-2" class="absolute w-24 h-24 rounded-full bg-emerald-500/25 blur-2xl transition-transform duration-[600ms]"></div>
                    <div id="glow-3" class="absolute w-24 h-24 rounded-full bg-amber-500/25 blur-2xl transition-transform duration-[600ms]"></div>
                    <div id="glow-4" class="absolute w-24 h-24 rounded-full bg-red-500/25 blur-2xl transition-transform duration-[600ms]"></div>
                    <div id="glow-5" class="absolute w-24 h-24 rounded-full bg-fuchsia-500/25 blur-2xl transition-transform duration-[600ms]"></div>
                    <div id="glow-6" class="absolute w-24 h-24 rounded-full bg-orange-500/25 blur-2xl transition-transform duration-[600ms]"></div>
                    <div id="glow-7" class="absolute w-24 h-24 rounded-full bg-rose-500/25 blur-2xl transition-transform duration-[600ms]"></div>
                    <div id="glow-8" class="absolute w-24 h-24 rounded-full bg-slate-500/25 blur-2xl transition-transform duration-[600ms]"></div>
                </div>


                <div id="welcome-sesc" class="absolute w-full text-center opacity-0 transform transition-all duration-700 font-montserrat z-20 pointer-events-none" style="transform: translateY(-90px);">
                    <span class="block text-slate-200/60 font-800 text-6xl md:text-8xl tracking-widest uppercase select-none">Sesc</span>
                </div>
                
                <div id="welcome-brasil" class="absolute w-full text-center opacity-0 transform transition-all duration-700 font-montserrat z-20 pointer-events-none" style="transform: translateY(110px);">
                    <span class="block text-slate-200/60 font-400 text-5xl md:text-7xl tracking-[0.2em] uppercase select-none">Brasil</span>
                </div>


                <div id="icon-X" class="actor absolute flex items-center justify-center z-30" style="transform: scale(0); opacity: 0;">
                    <div id="monogram-card" class="w-24 h-24 bg-[#020f3d] rounded-2xl shadow-2xl shadow-[#020f3d]/45 flex items-center justify-center font-montserrat text-4xl text-white select-none transition-all duration-700 overflow-hidden whitespace-nowrap">
                        <span id="monogram-i" class="font-normal animate-i-glitch inline-block transition-colors duration-700">i</span>
                        <span id="monogram-M" class="font-800 ml-[0.5px] transition-colors duration-700">M</span>
                    </div>
                    <span id="monogram-ESA" class="font-montserrat text-4xl font-800 text-[#020f3d] opacity-0 max-w-0 inline-block overflow-hidden transition-all duration-500" style="transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); margin-left: 2px; tracking-tight">ESA</span>
                </div>

            </div>
        </div>

        <div id="offline-alert" class="absolute flex flex-col items-center opacity-0 scale-95 transform transition-all duration-500 hidden z-30">
            <i data-lucide="wifi-off" class="text-slate-400 w-12 h-12 mb-3"></i>
            <span class="text-xl font-montserrat font-800 text-slate-700 mb-4 tracking-tight">Sem Conexão</span>
            <button onclick="window.location.reload()" class="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-full shadow-md transition-all active:scale-95 focus:outline-none text-sm tracking-wide">
                Tentar Novamente
            </button>
        </div>

        <div id="signature" class="absolute bottom-8 opacity-0 transition-opacity duration-1000 z-30">
            <p class="text-xs md:text-sm font-medium text-slate-400">
                Powered with <span class="text-[#e80523] text-sm md:text-base leading-none">&#10084;</span> by <strong class="text-slate-600">Mesaque</strong>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
