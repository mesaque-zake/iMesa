    <!-- ICONS: Tabler Icons (Novo) & Tailwind -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        dancing: ['"Dancing Script"', 'cursive'],
                        montserrat: ['"Montserrat"', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --navy-blue: #1e3a8a; 
            --navy-blue-trans: rgba(30, 58, 138, 0.15); 
        }

        body, html {
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            background-color: #0f172a; /* Fundo invisível por trás do iframe */
        }

        /* --- ANIMAÇÕES DE FÍSICA (EFEITO ESTILINGUE) --- */
        .actor {
            /* O cubic-bezier(0.34, 1.56, 0.64, 1) é o segredo do efeito estilingue (overshoot) */
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        opacity 0.3s ease-in-out;
        }

        .freeze {
            filter: grayscale(100%) brightness(50%) !important;
            opacity: 0.35 !important;
            transition: filter 0.8s ease-in-out, opacity 0.8s ease-in-out !important;
        }

        .shatter {
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        opacity 0.4s ease-in-out !important;
        }

        /* --- AURA PASTEL E CLEAN (As 6 Orbes) --- */
        .aura-mode {
            width: 0px !important;
            height: 0px !important;
            background-color: transparent !important;
            /* Um blur maciço porém muito suave, sem estourar as cores. Cria o efeito esfumaçado clean */
            box-shadow: 0 0 60px 40px var(--aura-core) !important; 
            border-radius: 50% !important;
            border: none !important;
            mix-blend-mode: normal; /* No fundo branco, normal com transparência evita a lama */
            opacity: 0.7;
            pointer-events: none;
            z-index: 10;
        }

        /* Esconde o ícone sem matar o elemento do DOM */
        .aura-mode > * {
            opacity: 0 !important;
            transform: scale(0) !important;
            transition: opacity 0.1s ease-out, transform 0.1s ease-out !important;
        }

        #loader-screen {
            transition: background-color 0.4s cubic-bezier(0.9, 0, 0.1, 1), opacity 0.4s ease-out;
        }

        /* --- LOGO OFICIAL --- */
        .logo-wrapper {
            font-size: clamp(14px, 2.5vw, 32px); 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.15em;
            transform: scale(0);
            opacity: 0;
            z-index: 30;
        }

        .text-sesc, .text-brasil {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            color: var(--navy-blue-trans);
            line-height: 0.8;
        }
        .text-sesc { font-size: 3.6em; letter-spacing: 0.05em; }
        .text-brasil { font-size: 2.5em; letter-spacing: 0.02em; }

        .text-imesa {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            color: var(--navy-blue);
            display: flex;
            align-items: baseline;
            line-height: 0.8;
            position: relative;
            z-index: 30;
        }
        .text-imesa .mesa { font-size: 2.8em; letter-spacing: -0.02em; }
        .text-i {
            font-family: 'Abril Fatface', serif;
            font-style: italic;
            color: var(--navy-blue);
            font-size: 2.2em;
            text-shadow: 0.04em 0 0 rgba(0, 255, 255, 0.6), -0.04em -0.02em 0 rgba(255, 0, 255, 0.6);
            margin-right: 0.15em; 
        }
    </style>
</head>

<body class="bg-slate-50 overflow-hidden font-sans text-slate-800 antialiased select-none w-screen h-screen m-0 p-0">

    <!-- IFRAME COM PODERES NATIVOS MÁXIMOS -->
    <iframe 
        id="gas-frame"
        src="https://script.google.com/macros/s/AKfycbwqH_39LNMF3UorGX_s_FogN8qKz8aCdL2PbzMXHnshFO80ucoHrAkVJyzHlf48f_54/exec" 
        class="absolute inset-0 w-full h-full border-none z-0"
        allow="camera; microphone; geolocation; clipboard-read; clipboard-write; display-capture; fullscreen"
        sandbox="allow-downloads allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin allow-forms allow-top-navigation">
    </iframe>

    <button id="install-btn" onclick="installPWA()" class="absolute bottom-6 right-6 md:bottom-10 md:right-10 bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-2 z-40 hidden opacity-0 translate-y-10 transition-all duration-500">

    <div id="ios-prompt" class="absolute bottom-8 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm bg-white p-4 rounded-2xl shadow-2xl z-40 hidden opacity-0 translate-y-10 transition-all duration-500 flex flex-col items-center text-center gap-2 border border-slate-100">
        <button onclick="document.getElementById('ios-prompt').classList.add('hidden')" class="absolute top-2 right-2 text-slate-400 hover:text-slate-600 transition-colors">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
        <p class="text-sm text-slate-600 font-medium leading-relaxed mt-2">
            Para instalar, toque em <i data-lucide="share" class="inline w-4 h-4 text-blue-500 mx-1"></i> <strong>Compartilhar</strong> e depois em <br><strong>"Adicionar à Tela de Início"</strong>.
        </p>
        <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-4 h-4 bg-white rotate-45 border-r border-b border-slate-100"></div>
    </div>

    <!-- TELA DE CARREGAMENTO & PALCO DA DANÇA -->
    <div id="loader-screen" class="absolute inset-0 w-full h-full bg-slate-50 z-50 flex items-center justify-center origin-center overflow-hidden">

        <div class="relative flex items-center justify-center w-[400px] h-[400px] md:scale-110 transform select-none">
            
            <div id="logo-wrapper" class="logo-wrapper absolute z-40 pointer-events-none select-none">
                <span class="text-sesc">SESC</span>
                <div class="text-imesa"><span class="text-i">i</span><span class="mesa">MESA</span></div>
                <span class="text-brasil">BRASIL</span>
            </div>

            <!-- OS 9 ATORES (O Grid 3x3 Perfeito) -->
            <!-- Top Row -->
            <div id="icon-0" class="actor absolute w-12 h-12 bg-fuchsia-800 rounded-2xl shadow-lg flex items-center justify-center z-20 font-dancing opacity-0 scale-0"><span class="text-white text-xl font-bold leading-none mt-1">W</span></div>
            <div id="icon-1" class="actor absolute w-12 h-12 bg-blue-600 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0"><i data-lucide="smartphone" class="text-white w-6 h-6"></i></div>
            <div id="icon-2" class="actor absolute w-12 h-12 bg-emerald-600 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0"><i data-lucide="droplets" class="text-white w-6 h-6"></i></div>
            
            <!-- Mid Row -->

            <div id="icon-4" class="actor absolute w-12 h-12 bg-orange-500 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0"><i data-lucide="receipt" class="text-white w-6 h-6"></i></div>
            <div id="icon-5" class="actor absolute w-12 h-12 bg-red-600 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0"><i data-lucide="file-text" class="text-white w-6 h-6"></i></div>
            
            <!-- Bot Row -->

            <div id="icon-7" class="actor absolute w-12 h-12 bg-violet-600 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0"><i class="ti ti-books text-white text-2xl"></i></div>
            <div id="icon-8" class="actor absolute w-12 h-12 bg-rose-600 rounded-2xl shadow-lg flex items-center justify-center z-20 opacity-0 scale-0"><i data-lucide="gamepad-2" class="text-white w-6 h-6"></i></div>
        </div>

        <div id="offline-alert" class="absolute flex flex-col items-center justify-center opacity-0 scale-95 transform transition-all duration-500 hidden z-50">
            <i data-lucide="wifi-off" class="text-slate-400 w-12 h-12 mb-3"></i>
            <span class="text-xl font-montserrat font-800 text-slate-700 mb-4 tracking-tight">Sem Conexão</span>
            <button onclick="window.location.reload()" class="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-full shadow-md transition-all active:scale-95 focus:outline-none text-sm tracking-wide">
                Tentar Novamente
            </button>

        <div id="signature" class="absolute bottom-8 opacity-0 transition-opacity duration-1000 z-30 w-full text-center pointer-events-none">
            <p class="text-xs md:text-sm font-medium text-slate-400">
                Powered with <span class="text-[#e80523] text-sm md:text-base leading-none">&#10084;</span> by <strong class="text-slate-600">Mesaque</strong>
            </p>
        </div>
    </div>

    <script>
        let iframeLoaded = false;
        let deferredPrompt = null;
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // Background Check do GAS
        window.addEventListener('DOMContentLoaded', () => {
            const iframe = document.getElementById('gas-frame');
            if (iframe) {
                iframe.addEventListener('load', () => {
                    console.log("[PWA] GAS carregado no fundo.");
                    iframeLoaded = true;
                });
            }
        });

        // Configuração Nativa: Botão Voltar não fecha o app
        window.addEventListener('DOMContentLoaded', () => { 
            window.history.replaceState({ state: 'pwa_base' }, ''); 
            window.history.pushState({ state: 'pwa_active' }, ''); 
        });
        window.addEventListener('popstate', () => {
            const iframe = document.getElementById('gas-frame');
            if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage({ action: 'back' }, '*');
            window.history.pushState({ state: 'pwa_active' }, '');
        });
        window.addEventListener('message', (event) => { 
            if (event.data && event.data.action === 'exit_app') window.close(); 
        });

        async function playOpeningSequence() {
            try {
                lucide.createIcons();

                // Busca os 9 ícones dinamicamente
                const icons = Array.from({length: 9}).map((_, i) => document.getElementById(`icon-${i}`));

                const signature = document.getElementById('signature');
                const loader = document.getElementById('loader-screen');
                const offlineAlert = document.getElementById('offline-alert');
                const logo = document.getElementById('logo-wrapper');

                // CONSTANTES DA GRID (Matemática Simétrica)
                const S = 56; // Espaçamento perfeito (Pixels)
                // pos[0] a pos[8] mapeia as posições X, Y da matriz 3x3
                const pos = [
                    {x: -S, y: -S}, {x: 0, y: -S}, {x: S, y: -S}, // Topo: Esq, Centro, Dir
                    {x: -S, y: 0},  {x: 0, y: 0},  {x: S, y: 0},  // Meio: Esq, Centro, Dir
                    {x: -S, y: S},  {x: 0, y: S},  {x: S, y: S}   // Baixo: Esq, Centro, Dir
                ];

                // ATO 1: "o" (O Ponto Central)
                icons[4].style.opacity = '1'; 
                icons[4].style.transform = `translate(${pos[4].x}px, ${pos[4].y}px) scale(1)`;
                if (signature) { signature.classList.remove('opacity-0'); signature.classList.add('opacity-100'); }
                await sleep(300);

                // TRUQUE DA MULTIPLICAÇÃO: Prepara 3 e 5 escondidos exatamente atrás do 4
                [3, 5].forEach(i => {
                    icons[i].style.transition = 'none'; // Desliga animação
                    icons[i].style.transform = `translate(${pos[4].x}px, ${pos[4].y}px) scale(1)`; // Posição do 4
                    icons[i].style.opacity = '1';
                });
                void icons[4].offsetWidth; // Força o navegador a registrar a posição (reflow)
                [3, 5].forEach(i => icons[i].style.transition = ''); // Religa a animação (estilingue)

                // ATO 2: "o o" (O 4 some, 3 e 5 atiram para os lados como uma divisão celular)
                icons[4].style.transform = `translate(${pos[4].x}px, ${pos[4].y}px) scale(0)`; 
                icons[3].style.transform = `translate(${pos[3].x}px, ${pos[3].y}px) scale(1)`;
                icons[5].style.transform = `translate(${pos[5].x}px, ${pos[5].y}px) scale(1)`;
                await sleep(250);

                // ATO 2.1: "o o o" (O 4 nasce de novo no meio)
                icons[4].style.transform = `translate(${pos[4].x}px, ${pos[4].y}px) scale(1)`; 
                await sleep(250);

                // TRUQUE DA MULTIPLICAÇÃO: Prepara 1 e 7 atrás do 4
                [1, 7].forEach(i => {
                    icons[i].style.transition = 'none';
                    icons[i].style.transform = `translate(${pos[4].x}px, ${pos[4].y}px) scale(1)`;
                    icons[i].style.opacity = '1';
                });
                void icons[4].offsetWidth;
                [1, 7].forEach(i => icons[i].style.transition = '');

                // ATO 3: Cruz (Atiram para Cima e Baixo a partir do centro)
                icons[1].style.transform = `translate(${pos[1].x}px, ${pos[1].y}px) scale(1)`;
                icons[7].style.transform = `translate(${pos[7].x}px, ${pos[7].y}px) scale(1)`;
                await sleep(250);

                // ATO 4: Formando o X (As quinas saem de dentro dos ícones do topo e da base)
                // 0 e 2 saem de trás do 1 (Topo) | 6 e 8 saem de trás do 7 (Base)
                const spawns = [
                    { id: 0, from: 1 }, { id: 2, from: 1 }, 
                    { id: 6, from: 7 }, { id: 8, from: 7 }
                ];
                
                for (let s of spawns) {
                    icons[s.id].style.transition = 'none';
                    icons[s.id].style.transform = `translate(${pos[s.from].x}px, ${pos[s.from].y}px) scale(1)`;
                    icons[s.id].style.opacity = '1';
                    void icons[s.id].offsetWidth; // Magia do Reflow
                    icons[s.id].style.transition = '';
                    
                    icons[s.id].style.transform = `translate(${pos[s.id].x}px, ${pos[s.id].y}px) scale(1)`;
                    await sleep(70); // Tiro rápido um a um
                }
                
                await sleep(600); // Pausa dramática para admirar o Grid 3x3

                // MODO OFFLINE (A Quebra)
                if (!navigator.onLine) {
                    icons.forEach(icon => icon.classList.add('freeze'));
                    await sleep(600);
                    icons.forEach(icon => icon.classList.add('shatter'));

                    // Caos controlado caindo para baixo
                    icons[0].style.transform = `translate(-120px, 300px) rotate(-115deg) scale(0.5)`;
                    icons[1].style.transform = `translate(20px, 280px) rotate(45deg) scale(0.5)`;
                    icons[2].style.transform = `translate(140px, 320px) rotate(135deg) scale(0.5)`;
                    icons[3].style.transform = `translate(-180px, 250px) rotate(-85deg) scale(0.5)`;
                    icons[4].style.transform = `translate(0px, 350px) rotate(15deg) scale(0.5)`;
                    icons[5].style.transform = `translate(190px, 270px) rotate(-45deg) scale(0.5)`;
                    icons[6].style.transform = `translate(-100px, 220px) rotate(-165deg) scale(0.5)`;
                    icons[7].style.transform = `translate(50px, 290px) rotate(90deg) scale(0.5)`;
                    icons[8].style.transform = `translate(160px, 240px) rotate(60deg) scale(0.5)`;

                    offlineAlert.classList.remove('hidden');
                    await sleep(50);
                    offlineAlert.classList.remove('opacity-0', 'scale-95');
                    offlineAlert.classList.add('opacity-100', 'scale-100');
                    return;
                }

                // ATO 6: IMPLOSÃO DO GRID (Todos voltam ao 0,0)
                icons.forEach(icon => {
                    icon.classList.remove('actor');
                    icon.style.transition = 'transform 0.4s cubic-bezier(0.9, 0, 0.1, 1)';
                    icon.style.transform = 'translate(0px, 0px) scale(0)';
                });

                if (signature) {
                    signature.style.transition = 'opacity 0.2s';
                    signature.style.opacity = '0';
                }

                await sleep(400);

                // AS 6 AURAS ESCOLHIDAS (Tons Pastéis Claros - Zero Lama)
                const auraColors = [
                    'rgba(232, 121, 249, 0.4)', // 0: Fuchsia Pastel
                    'rgba(96, 165, 250, 0.4)',  // 1: Azul Bebê
                    'rgba(52, 211, 153, 0.4)',  // 2: Esmeralda Menta
                    'rgba(253, 224, 71, 0.4)',  // 3: Amarelo Sol
                    'rgba(251, 146, 60, 0.4)',  // 4: Laranja Pêssego
                    'rgba(248, 113, 113, 0.4)'  // 5: Vermelho Salmão
                ];

                // Transmuta os 6 primeiros em Auras e desliga os 3 restantes
                icons.forEach((icon, index) => {
                    if (index < 6) {
                        icon.className = 'absolute z-20 flex items-center justify-center aura-mode'; 
                        icon.style.setProperty('--aura-core', auraColors[index]);
                    } else {
                        icon.style.display = 'none'; // Some permanentemente
                    }
                });

                await sleep(50); 

                // ATO 7.1: O NASCIMENTO DO LOGO E AURAS CONCENTRADAS (Imagem 1)
                logo.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s';
                logo.style.transform = 'scale(1)'; 
                logo.style.opacity = '1';

                for(let i=0; i<6; i++) {
                    icons[i].style.transition = 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
                }
                
                // Posições concentradas (Bem coladas ao centro)
                icons[0].style.transform = 'translate(-30px, -20px) scale(1)';
                icons[1].style.transform = 'translate(40px, -15px) scale(0.9)';
                icons[2].style.transform = 'translate(-25px, 30px) scale(1.1)';
                icons[3].style.transform = 'translate(30px, 20px) scale(1)';
                icons[4].style.transform = 'translate(-40px, 5px) scale(1.2)';
                icons[5].style.transform = 'translate(15px, -35px) scale(0.8)';

                await sleep(700); 

                // ATO 7.2: A EXPANSÃO DESPROPORCIONAL (Imagem 2)
                for(let i=0; i<6; i++) {
                    icons[i].style.transition = 'transform 2.0s cubic-bezier(0.25, 1, 0.5, 1)';
                }
                
                // Flutuam um pouco mais longe, mas não muito, mantendo o visual clean
                icons[0].style.transform = 'translate(-80px, -60px) scale(1.4)';
                icons[1].style.transform = 'translate(100px, 70px) scale(1.6)';
                icons[2].style.transform = 'translate(-90px, 80px) scale(1.3)';
                icons[3].style.transform = 'translate(80px, -70px) scale(1.7)';
                icons[4].style.transform = 'translate(-110px, 10px) scale(1.2)';
                icons[5].style.transform = 'translate(120px, 0px) scale(1.5)';

                await sleep(1800);

                let timeoutCounter = 0;
                while (!iframeLoaded && timeoutCounter < 30) {
                    await sleep(500);
                    timeoutCounter++;
                }

                // ATO 8: O VÁCUO FINAL (Suga tudo e revela o App)
                loader.style.backgroundColor = 'transparent'; 
                loader.style.opacity = '0'; 

                for(let i=0; i<6; i++) {
                    icons[i].style.transition = 'transform 0.3s cubic-bezier(0.9, 0, 0.1, 1), opacity 0.2s ease-in';
                    icons[i].style.transform = 'translate(0px, 0px) scale(0)';
                    icons[i].style.opacity = '0';
                }
                
                logo.style.transition = 'transform 0.3s cubic-bezier(0.9, 0, 0.1, 1), opacity 0.2s ease-in';
                logo.style.transform = 'scale(0)';
                logo.style.opacity = '0';

                await sleep(350);

                loader.style.pointerEvents = 'none';
                loader.classList.add('hidden');

            } catch (error) {
                console.error("Erro Crítico na Animação:", error);
                const loader = document.getElementById('loader-screen');
                if (loader) loader.style.display = 'none';
            }
        }

        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Erro: ', err));
            }
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            const installBtn = document.getElementById('install-btn');
            if (installBtn) {
                installBtn.classList.remove('hidden');
                setTimeout(() => installBtn.classList.remove('opacity-0', 'translate-y-10'), 50);
            }
        });

        window.installPWA = async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null;
            const installBtn = document.getElementById('install-btn');
            if (installBtn) {
                installBtn.classList.add('opacity-0', 'translate-y-10');
                setTimeout(() => installBtn.classList.add('hidden'), 300);
            }
        };

        function checkIOS() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
            if (isIOS && !isStandalone) {
                const iosPrompt = document.getElementById('ios-prompt');
                if (iosPrompt) {
                    iosPrompt.classList.remove('hidden'); setTimeout(() => iosPrompt.classList.remove('opacity-0', 'translate-y-10'), 50);
                    setTimeout(() => { iosPrompt.classList.add('opacity-0', 'translate-y-10'); setTimeout(() => iosPrompt.classList.add('hidden'), 300); }, 10000);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { playOpeningSequence(); registerServiceWorker(); checkIOS(); }, 100);
        });
    </script>
</body>
</html>
