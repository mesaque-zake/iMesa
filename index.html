<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check!</title>
    
    <!-- PWA Configs -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link rel="icon" type="image/png" href="assets/Favicon.png">
    <link rel="apple-touch-icon" href="assets/Icon180.png">
    
    <!-- Fontes e Estilos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Tailwind & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Configuração do Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 overflow-hidden font-sans text-slate-800 antialiased select-none">

    <!-- CAMADA 1: O GAS (Carrega no fundo silenciosamente com permissões para PDF) -->
    <iframe 
        id="gas-frame"
        src="https://script.google.com/macros/s/AKfycbwuXY3TSm_evKn3jJnblg-u9igohVkqIpd7JmHWr5N57BIef3PNlKbpoUaOLo0zX-rWsw/exec" 
        class="absolute inset-0 w-full h-full border-none z-0"
    </iframe>

    <!-- CAMADA 2: A CORTINA DA ANIMAÇÃO -->
    <div id="loader-screen" class="absolute inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
        
        <!-- Contêiner do Palco (Grade Invisível) -->
        <div class="relative w-48 h-48 flex items-center justify-center">
            
            <!-- Os 4 Ícones Iniciais -->
            <div id="icon-1" class="actor absolute w-16 h-16 bg-blue-600 rounded-2xl shadow-lg shadow-blue-600/40 flex items-center justify-center -translate-x-10 -translate-y-10">
                <i data-lucide="smartphone" class="text-white w-8 h-8"></i>
            </div>
            
            <div id="icon-2" class="actor absolute w-16 h-16 bg-emerald-600 rounded-2xl shadow-lg shadow-emerald-600/40 flex items-center justify-center translate-x-10 -translate-y-10">
                <i data-lucide="droplets" class="text-white w-8 h-8"></i>
            </div>

            <div id="icon-3" class="actor absolute w-16 h-16 bg-amber-500 rounded-2xl shadow-lg shadow-amber-500/40 flex items-center justify-center -translate-x-10 translate-y-10">
                <i data-lucide="bar-chart-3" class="text-white w-8 h-8"></i>
            </div>

            <div id="icon-4" class="actor absolute w-16 h-16 bg-red-600 rounded-2xl shadow-lg shadow-red-600/40 flex items-center justify-center translate-x-10 translate-y-10">
                <i data-lucide="file-text" class="text-white w-8 h-8"></i>
            </div>

            <!-- Ícone Final (Check) - Começa invisível -->
            <div id="icon-check" class="absolute w-20 h-20 bg-slate-800 rounded-2xl shadow-xl shadow-slate-800/40 flex items-center justify-center scale-0 opacity-0 transition-transform duration-300">
                <i data-lucide="check-square" class="text-white w-10 h-10"></i>
            </div>
        </div>

        <!-- Boas-vindas -->
        <div id="welcome-text" class="absolute bottom-32 flex flex-col items-center opacity-0 transform translate-y-4 transition-all duration-700">
            <span class="text-sm font-semibold text-slate-400 uppercase tracking-widest mb-1">Bem-vindo ao</span>
            <h1 class="text-3xl font-bold text-slate-800">Check!</h1>
        </div>

        <!-- Alerta Offline -->
        <div id="offline-alert" class="absolute bottom-32 flex flex-col items-center opacity-0 transform translate-y-4 transition-all duration-1000 hidden">
            <i data-lucide="wifi-off" class="text-slate-400 w-8 h-8 mb-2"></i>
            <span class="text-lg font-semibold text-slate-600 mb-4">Sem Conexão</span>
            <button onclick="window.location.reload()" class="px-6 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold rounded-full transition-colors">
                Recarregar Sistema
            </button>
        </div>

        <!-- Assinatura -->
        <div id="signature" class="absolute bottom-8 opacity-0 transition-opacity duration-1000">
            <p class="text-xs font-medium text-slate-400">
                Powered with <span class="text-[#e80523] text-sm leading-none">❤</span> by <strong class="text-slate-600">Mesaque</strong>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
